<div class="text-center hero my-5">
  @if (auth.loggedIn === false) {
    <div>
      <p class="lead">Login してください。</p>
    </div>
  }

  @if (auth.userProfile$ | async; as profile) {
    <div class="lead">
      <img
        [src]="profile.picture"
        alt="Profile picture"
        class="mb-3 app-logo"
        />
    </div>
  }
</div>
