name: Angular Build and Test

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (LTS) with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm

      - name: Verify Chrome availability
        run: |
          if command -v google-chrome >/dev/null 2>&1; then
            echo "CHROME_BIN=$(command -v google-chrome)" >> "$GITHUB_ENV"
            google-chrome --version
          elif command -v chromium-browser >/dev/null 2>&1; then
            echo "CHROME_BIN=$(command -v chromium-browser)" >> "$GITHUB_ENV"
            chromium-browser --version
          elif command -v chromium >/dev/null 2>&1; then
            echo "CHROME_BIN=$(command -v chromium)" >> "$GITHUB_ENV"
            chromium --version
          else
            echo "Chrome/Chromium not found on runner" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build -- --configuration production

      - name: Run unit tests (ChromeHeadless)
        run: npm test -- --no-watch --browsers ChromeHeadless
